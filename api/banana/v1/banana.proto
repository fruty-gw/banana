syntax = "proto3";
package banana.v1;

import "google/api/annotations.proto";

option go_package = "github.com/fruty-gw/banana/gen/go/api/banana/v1;bananav1";

// Ripeness — степень спелости банана.
enum Ripeness {
  // Значение по умолчанию, не указано.
  RIPENESS_UNSPECIFIED = 0;
  // Зелёный (неспелый).
  RIPENESS_GREEN = 1;
  // Жёлтый (спелый).
  RIPENESS_YELLOW = 2;
  // Коричневый (перезрелый).
  RIPENESS_BROWN = 3;
}

// Banana — сущность банана.
message Banana {
  // Уникальный идентификатор банана.
  int64 id = 1;
  // Очищен ли банан.
  bool peeled = 2;
  // Степень спелости банана.
  Ripeness ripeness = 3;
  // Вес банана в граммах.
  double weight_grams = 4;
}

// GetBananaRequest — запрос на получение банана.
message GetBananaRequest {
  // ID банана (path param).
  int64 id = 1;
  // Степень спелости (query param).
  Ripeness ripeness = 2;
}

// GetBananaResponse — ответ на запрос получения банана.
message GetBananaResponse {
  // Банан.
  Banana banana = 1;
}

// UpdateBananaRequest — запрос на обновление банана.
message UpdateBananaRequest {
  // ID банана (path param).
  int64 id = 1;
  // Новая степень спелости (json body).
  Ripeness ripeness = 2;
  // Новый вес в граммах (json body).
  double weight_grams = 3;
  // Отметить как очищенный (json body).
  bool peeled = 4;
}

// UpdateBananaResponse — ответ на запрос обновления банана.
message UpdateBananaResponse {
  // Обновлённый банан.
  Banana banana = 1;
}

// DeleteBananaRequest — запрос на удаление банана.
message DeleteBananaRequest {
  // ID банана (path param).
  int64 id = 1;
  // Степень спелости (query param).
  Ripeness ripeness = 2;
}

// DeleteBananaResponse — ответ на запрос удаления банана.
message DeleteBananaResponse {
  // Удалённый банан.
  Banana banana = 1;
}

// AddBananaRequest — запрос на добавление банана.
message AddBananaRequest {
  // Степень спелости нового банана (json body).
  Ripeness ripeness = 1;
  // Вес нового банана в граммах (json body).
  double weight_grams = 2;
}

// AddBananaResponse — ответ на запрос добавления банана.
message AddBananaResponse {
  // ID созданного банана.
  int64 id = 1;
}

// ListBananasRequest — запрос на получение списка бананов.
message ListBananasRequest {}

// ListBananasResponse — ответ на запрос получения списка бананов.
message ListBananasResponse {
  // Список бананов.
  repeated Banana bananas = 1;
  // Общее количество найденных бананов.
  int64 total = 2;
}

// BananaService — сервис для управления бананами.
service BananaService {
  // GetBanana возвращает банан по ID и степени спелости.
  // HTTP: GET /banana/{id}?ripeness=<ripeness>
  rpc GetBanana(GetBananaRequest) returns (GetBananaResponse) {
    option (google.api.http) = {
      get: "/banana/{id}"
      // ripeness передаётся как query-параметр автоматически
    };
  }

  // UpdateBanana обновляет данные банана по ID.
  // HTTP: PUT /banana/{id}
  rpc UpdateBanana(UpdateBananaRequest) returns (UpdateBananaResponse) {
    option (google.api.http) = {
      put: "/banana/{id}"
      body: "*"
    };
  }

  // DeleteBanana удаляет банан по ID и степени спелости.
  // HTTP: DELETE /banana/{id}?ripeness=<ripeness>
  rpc DeleteBanana(DeleteBananaRequest) returns (DeleteBananaResponse) {
    option (google.api.http) = {delete: "/banana/{id}"};
  }

  // AddBanana создаёт новый банан с заданными параметрами.
  // HTTP: POST /banana
  rpc AddBanana(AddBananaRequest) returns (AddBananaResponse) {
    option (google.api.http) = {
      post: "/banana"
      body: "*"
    };
  }

  // ListBananas возвращает список всех бананов.
  // HTTP: GET /banana
  rpc ListBananas(ListBananasRequest) returns (ListBananasResponse) {
    option (google.api.http) = {get: "/banana"};
  }
}
